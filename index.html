<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bloknot-chat</title>
<style>
  :root{--bg:#0b1020;--card:#0f1724;--accent:#3b82f6;--muted:#9aa4b2;--text:#e6eef6}
  html,body{height:100%;margin:0;background:linear-gradient(180deg,var(--bg),#071028);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial}
  .app{max-width:720px;margin:0 auto;padding:12px;display:flex;flex-direction:column;height:100vh;box-sizing:border-box}
  header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  h1{font-size:18px;margin:0}
  .card{background:var(--card);border-radius:10px;padding:10px;box-shadow:0 4px 18px rgba(2,6,23,0.6);display:flex;flex-direction:column;flex:1;overflow:hidden}
  .messages{flex:1;overflow:auto;padding:8px;display:flex;flex-direction:column;gap:8px}
  .msg{padding:8px;border-radius:8px;background:rgba(255,255,255,0.03);max-width:85%;}
  .meta{font-size:12px;color:var(--muted);margin-bottom:4px}
  .controls{display:flex;gap:8px;margin-top:8px}
  input,textarea,button{font-size:16px;border:0;background:transparent;color:var(--text);outline:none}
  .name{width:28%}
  .text{flex:1}
  .send{background:var(--accent);color:white;padding:10px 12px;border-radius:8px;min-width:72px;text-align:center}
  .small{font-size:12px;color:var(--muted);margin-top:6px}
  .actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .btn{background:rgba(255,255,255,0.03);padding:8px;border-radius:8px;color:var(--muted)}
  @media(max-width:420px){.name{width:35%}}
</style>
</head>
<body>
<div class="app">
  <header><h1>Bloknot-chat</h1><div style="margin-left:auto;font-size:12px;color:var(--muted)">local only</div></header>
  <div class="card">
    <div class="messages" id="messages" aria-live="polite"></div>
    <div class="controls">
      <input id="name" class="name" placeholder="Имя" />
      <textarea id="text" class="text" rows="2" placeholder="Сообщение"></textarea>
      <button id="send" class="send">Отправить</button>
    </div>
    <div class="actions">
      <button id="clear" class="btn">Очистить</button>
      <button id="export" class="btn">Экспорт</button>
      <button id="importBtn" class="btn">Импорт</button>
      <input id="importFile" type="file" accept="application/json" style="display:none" />
      <div class="small">Сообщения хранятся в localStorage. Открытые вкладки синхронизируются.</div>
    </div>
  </div>
</div>

<script>
(() => {
  const LS_KEY = 'bloknot_chat_msgs_v1';
  const messagesEl = document.getElementById('messages');
  const nameEl = document.getElementById('name');
  const textEl = document.getElementById('text');
  const sendBtn = document.getElementById('send');
  const clearBtn = document.getElementById('clear');
  const exportBtn = document.getElementById('export');
  const importBtn = document.getElementById('importBtn');
  const importFile = document.getElementById('importFile');

  function load() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch(e){ return []; }
  }
  function save(list){
    localStorage.setItem(LS_KEY, JSON.stringify(list));
    // trigger storage event for same-tab listeners isn't necessary
  }

  function render(){
    const list = load();
    messagesEl.innerHTML = '';
    list.forEach((m, i) => {
      const el = document.createElement('div');
      el.className = 'msg';
      el.innerHTML = '<div class="meta"><strong>' + escapeHtml(m.name) + '</strong> • ' + new Date(m.t).toLocaleString() + '</div>'
        + '<div>' + escapeHtml(m.text) + '</div>';
      el.addEventListener('click', () => {
        // quick edit: populate fields to edit, remove the message
        nameEl.value = m.name;
        textEl.value = m.text;
        // remove from list
        const l = load();
        l.splice(i,1);
        save(l);
        render();
      });
      messagesEl.appendChild(el);
    });
    // auto-scroll to bottom
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  sendBtn.addEventListener('click', () => {
    const name = nameEl.value.trim() || 'Аноним';
    const text = textEl.value.trim();
    if(!text) return;
    const list = load();
    list.push({name, text, t: Date.now()});
    save(list);
    textEl.value = '';
    render();
  });

  textEl.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendBtn.click();
    }
  });

  clearBtn.addEventListener('click', () => {
    if(confirm('Очистить все сообщения?')) {
      localStorage.removeItem(LS_KEY);
      render();
    }
  });

  exportBtn.addEventListener('click', () => {
    const data = localStorage.getItem(LS_KEY) || '[]';
    const blob = new Blob([data], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'bloknot-chat.json';
    a.click();
    URL.revokeObjectURL(url);
  });

  importBtn.addEventListener('click', () => importFile.click());
  importFile.addEventListener('change', (e) => {
    const f = e.target.files[0];
    if(!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const parsed = JSON.parse(r.result);
        if(!Array.isArray(parsed)) throw 0;
        save(parsed);
        render();
      } catch {
        alert('Неверный формат JSON');
      }
    };
    r.readAsText(f);
    importFile.value = '';
  });

  // sync across tabs
  window.addEventListener('storage', (e) => {
    if(e.key === LS_KEY) render();
  });

  render();
})();
</script>
