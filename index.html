<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Чат — с эмодзи в строке ввода</title>
<style>
  :root{
    --bg:#fafafa;
    --input-bg:#fff;
    --accent:#1a73e8;
    --muted:#777;
    --border:#e0e0e0;
  }
  html,body{height:100%;margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;}
  body{background:var(--bg);display:flex;flex-direction:column}
  .app {
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
  }

  /* Секция сообщений (скроллируемая) */
  .messages {
    flex:1 1 auto;
    overflow:auto;
    padding:16px;
    box-sizing:border-box;
  }
  .msg {
    margin-bottom:10px;
    background:#fff;
    border:1px solid var(--border);
    padding:8px 10px;
    border-radius:8px;
    max-width:80%;
    word-wrap:break-word;
  }
  .msg.me { margin-left:auto; background:#e8f0ff; border-color:#c7dbff; }

  /* Фиксированный блок ввода внизу */
  .chat-bar {
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    background:var(--input-bg);
    border-top:1px solid var(--border);
    padding:8px;
    box-sizing:border-box;
    display:flex;
    gap:8px;
    align-items:flex-end;
    z-index:1000;
    /* учёт выреза/панели */
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 8px);
  }

  /* Контейнер слева: эмодзи панель (горизонтальный список) */
  .left-controls {
    display:flex;
    align-items:center;
    gap:8px;
    flex:0 0 auto;
  }

  /* Кнопка переключения эмодзи (маленькая) */
  .emoji-toggle {
    width:40px;
    height:40px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border-radius:8px;
    border:1px solid var(--border);
    background:#fff;
    cursor:pointer;
    font-size:18px;
  }

  /* Горизонтальная панель эмодзи (в одну строку). Прикрыта по умолчанию */
  .emoji-strip {
    display:flex;
    gap:6px;
    align-items:center;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    max-width:220px; /* подгоните под нужную ширину */
    padding:4px;
    border-radius:8px;
    border:1px solid var(--border);
    background:#fff;
    height:40px;
    box-sizing:border-box;
  }

  .emoji-strip button {
    border:0;
    background:transparent;
    font-size:20px;
    cursor:pointer;
    padding:2px 6px;
    border-radius:6px;
  }
  .emoji-strip button:active { background:#f0f0f0; }

  /* Текстовое поле — занимает всё доступное место */
  .input-wrap {
    flex:1 1 auto;
    display:flex;
    align-items:flex-end;
    gap:8px;
    min-width:0; /* важно для корректного сокращения на мобильных */
  }
  textarea#msg {
    width:100%;
    min-height:44px;
    max-height:140px;
    resize:none;
    padding:8px;
    border-radius:8px;
    border:1px solid var(--border);
    box-sizing:border-box;
    font-size:15px;
    line-height:1.2;
    background:#fff;
  }

  /* Кнопка отправки справа */
  .send-btn {
    flex:0 0 auto;
    margin-left:6px;
    height:44px;
    padding:0 12px;
    border:0;
    background:var(--accent);
    color:#fff;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
  }

  /* Отступ для сообщений равный высоте .chat-bar */
  .messages-padding {
    padding-bottom: calc(64px + env(safe-area-inset-bottom, 0px));
  }

  /* Нормализация на очень узких экранах: emoji-strip скрывается за toggle */
  @media (max-width:420px){
    .emoji-strip { max-width:120px; }
    .emoji-toggle { width:36px; height:36px; font-size:16px; }
    textarea#msg { min-height:40px; }
  }
</style>
</head>
<body>
<div class="app">
  <main class="messages messages-padding" id="messages" aria-live="polite">
    <!-- Пример сообщений -->
    <div class="msg">Привет! Это тестовое сообщение.</div>
    <div class="msg me">Моё сообщение.</div>
  </main>

  <div class="chat-bar" id="chatBar">
    <div class="left-controls">
      <button class="emoji-toggle" id="emojiToggle" aria-label="Эмодзи">😊</button>

      <div class="emoji-strip" id="emojiStrip" aria-hidden="true">
        <!-- Вставьте/отредактируйте список эмодзи -->
        <button class="emoji">😀</button>
        <button class="emoji">😃</button>
        <button class="emoji">😅</button>
        <button class="emoji">😂</button>
        <button class="emoji">🙂</button>
        <button class="emoji">😉</button>
        <button class="emoji">😮</button>
        <button class="emoji">😢</button>
        <button class="emoji">😡</button>
        <button class="emoji">👍</button>
        <button class="emoji">👎</button>
        <button class="emoji">🙏</button>
      </div>
    </div>

    <div class="input-wrap">
      <textarea id="msg" placeholder="Напишите сообщение..." rows="1" aria-label="Сообщение"></textarea>
    </div>

    <button class="send-btn" id="sendBtn">Отправить</button>
  </div>
</div>

<script>
  // Элементы
  const msgInput = document.getElementById('msg');
  const sendBtn = document.getElementById('sendBtn');
  const messages = document.getElementById('messages');
  const emojiToggle = document.getElementById('emojiToggle');
  const emojiStrip = document.getElementById('emojiStrip');

  // Подгоняем padding-bottom сообщений под высоту chat-bar
  function updateMessagesPadding(){
    const chatBar = document.getElementById('chatBar');
    const h = chatBar.getBoundingClientRect().height;
    messages.style.paddingBottom = (h + 12) + 'px';
  }
  window.addEventListener('resize', updateMessagesPadding);
  window.addEventListener('load', updateMessagesPadding);
  // Небольшая задержка на мобильных чтобы вычисления были точнее
  setTimeout(updateMessagesPadding,250);

  // Toggle видимости emojiStrip: на мобильных она всегда видима в одну строку, но можно скрывать
  let emojiVisible = true; // по требованию можно сделать false
  function setEmojiVisibility(v){
    emojiVisible = v;
    emojiStrip.style.display = v ? 'flex' : 'none';
    emojiStrip.setAttribute('aria-hidden', v ? 'false' : 'true');
    setTimeout(updateMessagesPadding,120);
  }
  // Изначально показываем (по задаче — панель слева от кнопки, в одной строке)
  setEmojiVisibility(true);

  emojiToggle.addEventListener('click', () => {
    // если хотите переключать видимость — раскомментируйте:
    // setEmojiVisibility(!emojiVisible);
    // Для удобства при клике фокусируем поле ввода
    msgInput.focus();
  });

  // Вставка эмодзи в текстареа на курсор
  document.querySelectorAll('.emoji').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      const emoji = e.currentTarget.textContent || '';
      const start = msgInput.selectionStart || 0;
      const end = msgInput.selectionEnd || 0;
      const val = msgInput.value || '';
      msgInput.value = val.slice(0,start) + emoji + val.slice(end);
      const caret = start + emoji.length;
      msgInput.setSelectionRange(caret, caret);
      msgInput.focus();
    });
  });

  // Авто-рост textarea (простая реализация)
  function autoGrow(el){
    el.style.height = 'auto';
    const max = 140;
    el.style.height = Math.min(el.scrollHeight, max) + 'px';
    updateMessagesPadding();
  }
  msgInput.addEventListener('input', ()=>autoGrow(msgInput));
  msgInput.addEventListener('focus', ()=> {
    // при фокусе можно прокрутить вниз, чтобы поле было видно над клавиатурой
    setTimeout(()=>window.scrollTo(0, document.body.scrollHeight), 150);
  });

  // Отправка сообщения (локально — замените на вызов Firebase)
  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
  });

  function sendMessage(){
    const text = msgInput.value.trim();
    if(!text) return;
    appendMessage(text, true);
    msgInput.value = '';
    autoGrow(msgInput);
    // TODO: отправить в Firebase (push)
  }

  function appendMessage(text, me){
    const d = document.createElement('div');
    d.className = 'msg' + (me? ' me' : '');
    d.textContent = text;
    messages.appendChild(d);
    // прокрутка к низу
    setTimeout(()=> messages.scrollTop = messages.scrollHeight, 50);
  }

  // Пример: при загрузке — прокрутить вниз
  setTimeout(()=> messages.scrollTop = messages.scrollHeight, 200);
</script>
</body>
</html>
