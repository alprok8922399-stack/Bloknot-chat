<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Простой чат (Firebase)</title>
  <style>
    body{font-family:system-ui,Arial,sans-serif;margin:0;padding:0;display:flex;flex-direction:column;height:100vh}
    header{background:#111;color:#fff;padding:12px 16px}
    main{flex:1;display:flex;flex-direction:column;padding:12px;gap:8px;background:#f5f5f5}
    .messages{flex:1;overflow:auto;background:#fff;padding:12px;border-radius:6px;border:1px solid #e0e0e0}
    .msg{padding:8px;border-bottom:1px solid #eee}
    .msg:last-child{border-bottom:0}
    .meta{font-size:12px;color:#666}
    form{display:flex;flex-direction:column;gap:8px}
    input[type="text"], textarea{padding:8px;border:1px solid #ccc;border-radius:6px;font-family:inherit}
    .name{width:100%;max-width:320px}
    textarea{resize:none;overflow:auto;min-height:44px;max-height:160px;line-height:1.2}
    .controls{display:flex;gap:8px;align-items:center}
    .send-btn{padding:8px 12px;border-radius:6px;border:0;background:#0077ff;color:#fff}
    @media (min-width:640px){ main{padding:18px} .name{max-width:420px} }
  </style>
</head>
<body>
  <header>
    <strong>Простой чат (Firebase Realtime Database)</strong>
  </header>

  <main>
    <div class="messages" id="messages" aria-live="polite"></div>

    <form id="form">
      <input class="name" id="name" type="text" placeholder="Имя" maxlength="30" />
      <textarea id="text" placeholder="Сообщение" required></textarea>

      <div class="controls">
        <button type="submit" class="send-btn">Отправить</button>
        <div style="font-size:12px;color:#666">Сообщения синхронизируются через Firebase — откройте ту же страницу у друга.</div>
      </div>
    </form>
  </main>

  <!-- Firebase (compat CDN) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    // Вставьте сюда ваш firebaseConfig (не менять поля)
    const firebaseConfig = {
      apiKey: "AIzaSyAH-VNb_wc0yuxN6tPGouzkmkWt4FQ-Fh4",
      authDomain: "alexey-prilozenie.firebaseapp.com",
      projectId: "alexey-prilozenie",
      storageBucket: "alexey-prilozenie.firebasestorage.app",
      messagingSenderId: "225561187295",
      appId: "1:225561187295:web:90e2fb6fdb1c0360976a6a",
      measurementId: "G-QYHQ01M9F2"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const form = document.getElementById('form');
    const nameInput = document.getElementById('name');
    const textInput = document.getElementById('text');
    const messagesEl = document.getElementById('messages');

    const LS_NAME_KEY = 'simple_chat_name';
    (function loadName(){
      const saved = localStorage.getItem(LS_NAME_KEY);
      if(saved) nameInput.value = saved;
    })();

    function saveNameLocally(n){
      try{ localStorage.setItem(LS_NAME_KEY, n); }catch(e){}
    }

    function saveMessage(name, text){
      const ref = database.ref('messages').push();
      ref.set({
        name: name || 'Аноним',
        text: text,
        time: Date.now()
      }).catch(err => console.error('Ошибка записи:', err));
    }

    function renderMessage(msg){
      const div = document.createElement('div');
      div.className = 'msg';
      const time = new Date(msg.time || Date.now());
      const hh = time.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      div.innerHTML = '<div><strong>' + escapeHtml(msg.name||'') + '</strong></div>'
                    + '<div style="white-space:pre-wrap;margin-top:6px;">' + escapeHtml(msg.text||'') + '</div>'
                    + '<div class="meta">' + hh + '</div>';
      messagesEl.appendChild(div);
    }

    function escapeHtml(s){
      if(!s) return '';
      return s.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
    }

    function listenMessages(){
      const ref = database.ref('messages').limitToLast(200);
      ref.off();
      ref.on('child_added', snapshot => {
        const msg = snapshot.val();
        renderMessage(msg);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    function clearMessagesUI(){ messagesEl.innerHTML = ''; }

    // Авто-растягивание textarea (высота по контенту)
    function autoResizeTextarea(el){
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 160) + 'px';
    }
    textInput.addEventListener('input', () => autoResizeTextarea(textInput));
    // Инициалный вызов
    autoResizeTextarea(textInput);

    form.addEventListener('submit', function(e){
      e.preventDefault();
      const name = nameInput.value.trim() || 'Аноним';
      const text = textInput.value.trim();
      if(!text) return;
      saveNameLocally(name);
      saveMessage(name, text);
      textInput.value = '';
      autoResizeTextarea(textInput);
      textInput.focus();
    });

    (function init(){
      clearMessagesUI();
      listenMessages();
    })();
  </script>
</body>
</html>
